name: Autograding Tests
'on':
- push
- repository_dispatch
permissions:
  checks: write
  actions: read
  contents: read
jobs:
  run-autograding-tests:
    runs-on: ubuntu-latest
    if: github.actor != 'github-classroom[bot]'
    steps:
    - name: Checkout code
      uses: actions/checkout@v4
    - name: File runs without errors
      id: file-runs-without-errors
      uses: classroom-resources/autograding-command-grader@v1
      with:
        test-name: File runs without errors
        setup-command: pip install pytest --quiet
        command: ytest tests/test_task.py::test_file_runs_without_errors -v
        timeout: 10
        max-score: 0
    - name: 'Task 1: Prints a name'
      id: task-1-prints-a-name
      uses: classroom-resources/autograding-command-grader@v1
      with:
        test-name: 'Task 1: Prints a name'
        setup-command: ''
        command: pytest tests/test_task.py::test_task1_prints_a_name -v
        timeout: 10
        max-score: 10
    - name: 'Task 2: Hello, World!'
      id: task-2-hello-world
      uses: classroom-resources/autograding-command-grader@v1
      with:
        test-name: 'Task 2: Hello, World!'
        setup-command: ''
        command: pytest tests/test_task.py::test_task2_hello_world -v
        timeout: 10
        max-score: 20
    - name: 'Task 3: Prints 42'
      id: task-3-prints-42
      uses: classroom-resources/autograding-command-grader@v1
      with:
        test-name: 'Task 3: Prints 42'
        setup-command: ''
        command: pytest tests/test_task.py::test_task3_prints_42 -v
        timeout: 10
        max-score: 20
    - name: 'Task 4: Prints sum of 10 + 5'
      id: task-4-prints-sum-of-10-5
      uses: classroom-resources/autograding-command-grader@v1
      with:
        test-name: 'Task 4: Prints sum of 10 + 5'
        setup-command: ''
        command: pytest tests/test_task.py::test_task4_prints_sum -v
        timeout: 10
        max-score: 20
    - name: 'Task 5: Two lines with single print'
      id: task-5-two-lines-with-single-print
      uses: classroom-resources/autograding-command-grader@v1
      with:
        test-name: 'Task 5: Two lines with single print'
        setup-command: ''
        command: pytest tests/test_task.py::test_task5_two_lines -v
        timeout: 10
        max-score: 30
    - name: Autograding Reporter
      uses: classroom-resources/autograding-grading-reporter@v1
      env:
        FILE-RUNS-WITHOUT-ERRORS_RESULTS: "${{steps.file-runs-without-errors.outputs.result}}"
        TASK-1-PRINTS-A-NAME_RESULTS: "${{steps.task-1-prints-a-name.outputs.result}}"
        TASK-2-HELLO-WORLD_RESULTS: "${{steps.task-2-hello-world.outputs.result}}"
        TASK-3-PRINTS-42_RESULTS: "${{steps.task-3-prints-42.outputs.result}}"
        TASK-4-PRINTS-SUM-OF-10-5_RESULTS: "${{steps.task-4-prints-sum-of-10-5.outputs.result}}"
        TASK-5-TWO-LINES-WITH-SINGLE-PRINT_RESULTS: "${{steps.task-5-two-lines-with-single-print.outputs.result}}"
      with:
        runners: file-runs-without-errors,task-1-prints-a-name,task-2-hello-world,task-3-prints-42,task-4-prints-sum-of-10-5,task-5-two-lines-with-single-print
